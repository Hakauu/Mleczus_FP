<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mleczus</title>

    <style>

        body {
            font-family: sans-serif;
            background: #111;
            color: white;
            text-align: center;

        }

        .gallery {
            display: grid;
            max-width: 800px;
            grid-template-columns:repeat(2, 1fr);
            gap: 15px;
            margin: auto;
            padding: 20px;
        }

        .gallery img {
            border-radius:10px ;
            transition: 0.4s;

            cursor: pointer;

            width: 100%;

        }
#powiekszenie {
position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.90);
    display: none;
    justify-content: center;
    align-items: center;

}


#powiekszenieimg {
    max-width: 90%;
    max-height: 90%;


}
    </style>

</head>

<body>

<h2>Mleczus Polarek</h2>


<div class="gallery">

    <img src="img1.png" onclick="show(this)">
    <img src="img2.jpg" onclick="show(this)">
    <img src="img3.jpg" onclick="show(this)">
    <img src="img4.jpg" onclick="show(this)">
    <img src="img5.png" onclick="show(this)">
    <img src="img6.jpg" onclick="show(this)">
    <img src="img7.jpg" onclick="show(this)">
    <img src="img8.jpg" onclick="show(this)">
    <img src="img9.jpg" onclick="show(this)">


</div>

<div id="powiekszenie" onclick="hide()">

    <img id="big">

</div>

<script>

    function show(img) {
        document.getElementById("powiekszenie").style.display = "flex";
        document.getElementById("big").src = img.src;
    }
    function hide() {
        document.getElementById("powiekszenie").style.display = "none";
    }
        </script>


    }











</body>
</html>
